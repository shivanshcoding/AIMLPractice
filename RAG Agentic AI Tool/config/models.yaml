# =============================================================================
# RAG Retrieval Engine — Central Model Configuration
# =============================================================================
# All models are loaded dynamically from this file.
# Swap any model by changing this config — zero source code changes required.
#
# Supported providers:
#   - huggingface    : Local GPU via SentenceTransformers / FlagEmbedding
#   - vllm           : Local GPU via vLLM OpenAI-compatible server
#   - ollama         : Local via Ollama server
#   - openai         : OpenAI API (future migration)
#   - anthropic      : Anthropic API (future migration)
#   - google         : Google Gemini API (future migration)
# =============================================================================

# --- Embedding Model ---
# BGE-M3: Multi-Functionality (dense + sparse + ColBERT), Multi-Linguality,
# Multi-Granularity (up to 8192 tokens). Produces 1024-dim dense vectors.
embedding_model:
  provider: huggingface
  model: BAAI/bge-m3
  device: cuda          # cuda | cpu | mps
  batch_size: 32
  max_length: 8192
  normalize_embeddings: true
  dense_dim: 1024
  # Enable sparse vector generation for hybrid retrieval
  use_sparse: true
  # Enable ColBERT multi-vector (optional, heavier)
  use_colbert: false

# --- Reranker Model ---
# BGE Reranker v2 M3: Cross-encoder reranker optimized for multilingual retrieval.
reranker_model:
  provider: huggingface
  model: BAAI/bge-reranker-v2-m3
  device: cuda
  batch_size: 64
  max_length: 1024
  # Normalize scores to [0, 1] range
  normalize: true

# --- Generation Model ---
# Qwen3-14B: Strong instruction-following, reasoning, and generation.
# Served via vLLM as an OpenAI-compatible endpoint.
generation_model:
  provider: vllm
  model: Qwen/Qwen3-14B
  base_url: http://localhost:8000/v1
  api_key: token-rag-engine
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.9

# --- Query Expansion / Transformation Model ---
# Qwen3-8B: Used for query rewriting, expansion, HyDE, step-back prompting.
# Lighter model for high-throughput query transformation tasks.
query_expansion_model:
  provider: vllm
  model: Qwen/Qwen3-8B
  base_url: http://localhost:8001/v1
  api_key: token-rag-engine
  max_tokens: 1024
  temperature: 0.3
  top_p: 0.95

# --- Evaluation Judge Model ---
# Used by RAGAS and DeepEval as the LLM judge for evaluating retrieval quality.
evaluation_model:
  provider: vllm
  model: Qwen/Qwen3-8B
  base_url: http://localhost:8001/v1
  api_key: token-rag-engine
  max_tokens: 2048
  temperature: 0.0
  top_p: 1.0

# --- Alternative Embedding Models (for benchmarking) ---
alternative_embeddings:
  bge_large:
    provider: huggingface
    model: BAAI/bge-large-en-v1.5
    device: cuda
    batch_size: 64
    max_length: 512
    dense_dim: 1024
    use_sparse: false

  e5_large:
    provider: huggingface
    model: intfloat/e5-large-v2
    device: cuda
    batch_size: 64
    max_length: 512
    dense_dim: 1024
    use_sparse: false

  jina_v3:
    provider: huggingface
    model: jinaai/jina-embeddings-v3
    device: cuda
    batch_size: 32
    max_length: 8192
    dense_dim: 1024
    use_sparse: false

  nomic_v1_5:
    provider: huggingface
    model: nomic-ai/nomic-embed-text-v1.5
    device: cuda
    batch_size: 64
    max_length: 8192
    dense_dim: 768
    use_sparse: false

# --- Alternative Reranker Models (for benchmarking) ---
alternative_rerankers:
  cross_encoder_ms_marco:
    provider: huggingface
    model: cross-encoder/ms-marco-MiniLM-L-12-v2
    device: cuda
    batch_size: 128
    max_length: 512
