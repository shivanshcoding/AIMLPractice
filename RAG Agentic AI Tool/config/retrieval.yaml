# =============================================================================
# RAG Retrieval Engine — Retrieval Strategy Configuration
# =============================================================================

# --- Qdrant Vector Store ---
qdrant:
  host: localhost
  port: 6333
  grpc_port: 6334
  # Use "memory" for in-process testing, "disk" for persistent local, or "server" for Docker
  mode: memory
  collection_name: rag_documents
  # Named vector configurations
  dense_vector_name: dense
  sparse_vector_name: sparse
  # HNSW index parameters
  hnsw_config:
    m: 16
    ef_construct: 100
    on_disk: false

# --- BM25 Sparse Index ---
bm25:
  # Persist the BM25 index to disk
  persist_path: data/bm25_index.pkl
  # Tokenizer settings
  tokenizer: word
  lowercase: true
  remove_stopwords: true

# --- Retrieval Defaults ---
retrieval:
  default_top_k: 10
  rerank_top_k: 5
  max_retrieval_iterations: 3
  confidence_threshold: 0.7

  # Strategy mapping by query type
  strategy_map:
    factual:
      retriever: hybrid
      query_transform: none
      rerank: true
    analytical:
      retriever: hybrid
      query_transform: step_back
      rerank: true
    comparative:
      retriever: hybrid
      query_transform: multi_query
      rerank: true
    procedural:
      retriever: hybrid
      query_transform: hyde
      rerank: true

# --- Fusion Configuration ---
fusion:
  # Method: "rrf" (Reciprocal Rank Fusion) or "weighted"
  method: rrf
  # RRF constant (k parameter)
  rrf_k: 60
  # Weighted fusion weights (must sum to 1.0)
  dense_weight: 0.7
  sparse_weight: 0.3

# --- Metadata Filtering ---
metadata:
  # Filterable fields stored as Qdrant payloads
  filterable_fields:
    - source
    - department
    - date
    - version
    - tags
    - access_level
  # Enable metadata-boosted ranking
  metadata_boost_enabled: true
  # Boost weights for metadata matches
  boost_weights:
    department: 0.1
    recency: 0.05

# --- Long Context Optimization ---
context_optimization:
  # Lost-in-the-middle mitigation: reorder relevant docs to start/end
  lost_in_middle_mitigation: true
  # Context packing: maximize context window usage
  context_packing: true
  # Maximum context tokens before compression
  max_context_tokens: 4096
