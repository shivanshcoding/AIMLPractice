# =============================================================================
# RAG Retrieval Engine — Chunking Strategy Configuration
# =============================================================================

# --- Default Strategy ---
# Options: fixed, recursive, semantic, parent_child, document_aware, auto
default_strategy: auto

# --- Fixed Chunking ---
fixed:
  chunk_size: 512        # tokens
  chunk_overlap: 64      # tokens

# --- Recursive Character Chunking ---
recursive:
  chunk_size: 1000       # characters
  chunk_overlap: 200     # characters
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "
    - ""

# --- Semantic Chunking ---
semantic:
  # Breakpoint detection: percentile, standard_deviation, interquartile
  breakpoint_threshold_type: percentile
  breakpoint_threshold: 95
  min_chunk_size: 100    # characters
  max_chunk_size: 2000   # characters
  # Uses the primary embedding model for sentence similarity

# --- Parent-Child Chunking ---
parent_child:
  parent_chunk_size: 2000   # characters
  parent_chunk_overlap: 200
  child_chunk_size: 500     # characters
  child_chunk_overlap: 50

# --- Document-Aware Chunking ---
document_aware:
  # Respect structural boundaries
  respect_headings: true
  respect_paragraphs: true
  respect_lists: true
  respect_tables: true
  # Fallback if no structure detected
  fallback_strategy: recursive
  max_chunk_size: 1500   # characters
  min_chunk_size: 100    # characters

# --- Auto-Selection Heuristics ---
auto_selection:
  # Thresholds for choosing strategy based on document analysis
  rules:
    - condition: "heading_density > 0.05 and table_count > 0"
      strategy: document_aware
    - condition: "avg_paragraph_length > 500"
      strategy: semantic
    - condition: "has_hierarchical_sections"
      strategy: parent_child
    - condition: "avg_paragraph_length < 200"
      strategy: recursive
    - condition: "default"
      strategy: recursive
